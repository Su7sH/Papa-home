const link = t => t.url;
const dayIndex = Math.floor(Date.now() / 864e5);
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;");

const marDays = ["रविवार","सोमवार","मंगळवार","बुधवार","गुरुवार","शुक्रवार","शनिवार"];
const marMonths = ["जानेवारी","फेब्रुवारी","मार्च","एप्रिल","मे","जून","जुलै","ऑगस्ट","सप्टेंबर","ऑक्टोबर","नोव्हेंबर","डिसेंबर"];
const now = new Date();
document.getElementById("today").textContent =
  marDays[now.getDay()] + ", " + now.getDate() + " " + marMonths[now.getMonth()] + " " + now.getFullYear();

function getPath() {
  return (location.hash.replace(/^#\/?/, "") || "").split("/").filter(x => x !== "").map(Number);
}
function nodeAt(path) {
  let list = MENU, node = null, crumbs = [];
  for (const i of path) {
    node = list[i];
    if (!node) return {node:null, crumbs};
    crumbs.push(node.mr);
    list = node.children || [];
  }
  return {node, crumbs};
}
function go(idx) {
  const p = getPath(); p.push(idx);
  location.hash = "/" + p.join("/");
}
function tileHTML(t, idx, inheritColor, tag) {
  const color = t.color || inheritColor;
  const icon = t.img
    ? '<img class="logo" src="' + t.img + '" alt="" loading="lazy" onerror="this.parentElement.textContent=\'' + t.emoji + '\'">'
    : t.emoji;
  const inner = '<div class="emoji">' + icon + '</div><div class="txt">' +
                (tag ? '<span class="tag">' + esc(tag) + '</span><br>' : '') +
                '<div class="mr">' + esc(t.mr) + '</div><div class="en">' + esc(t.en) + '</div>' +
                (t.children ? '<div class="more">आत पहा (' + t.children.length + ')</div>' : '') + '</div>' +
                (t.children ? '<div class="chev">▸</div>' : '<div class="spacer"></div>');
  if (t.children) {
    return '<button class="tile" style="background:' + color + '" onclick="go(' + idx + ')">' + inner + '</button>';
  }
  return '<a class="tile" style="background:' + color + '" href="' + link(t) + '" target="_blank" rel="noopener">' + inner + '</a>';
}
function render() {
  const path = getPath();
  const {node, crumbs} = nodeAt(path);
  const app = document.getElementById("app");
  let html = "";

  if (path.length === 0) {
    // HOME — calm: quote, today's 3 good choices, five buckets.
    const qd = QUOTES[dayIndex % QUOTES.length];
    html += '<div class="quote">“' + qd.t + '”' + (qd.w ? '<span class="who">— ' + qd.w + '</span>' : '') + '</div>';

    html += '<div class="section-title">आजचे ३ चांगले पर्याय <span>Today\'s 3 good choices</span></div><div class="grid">';
    const dailyColors = ["#FF8C00","#E3008C","#107C10"];
    DAILY_POOLS.forEach((pool, i) => {
      const t = pool.list[dayIndex % pool.list.length];
      html += tileHTML(t, i, dailyColors[i], pool.tag);
    });
    html += '</div>';

    html += '<div class="section-title">विभाग <span>Sections</span></div><div class="grid">';
    MENU.forEach((t, i) => { html += tileHTML(t, i, t.color); });
    html += '</div>';
  } else if (node) {
    html += '<div class="backbar"><button onclick="history.back()">← मागे' +
            '<span class="crumb">' + esc(crumbs.join(" › ")) + '</span>' +
            '<span class="crumb-s">' + esc(crumbs[crumbs.length - 1]) + '</span></button></div>';
    html += '<div class="section-title">' + esc(node.mr) + ' <span>' + esc(node.en) + '</span></div><div class="grid">';
    (node.children || []).forEach((t, i) => { html += tileHTML(t, i, t.color || node.color); });
    html += '</div>';
  } else {
    location.hash = ""; return;
  }
  app.innerHTML = html;
  window.scrollTo(0, 0);
}
window.addEventListener("hashchange", render);
render();

function sumHrs(list){ return list.reduce((a,t)=>a + (t.hrs||0) + (t.children?sumHrs(t.children):0), 0); }
const totalHrs = sumHrs(MENU);
